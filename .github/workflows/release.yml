name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libspeechd-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LuoXiaoHei Pet ${{ github.ref_name }}'
          releaseBody: |
            ## LuoXiaoHei Desktop Pet ${{ github.ref_name }}

            Cross-platform desktop pet with streaming AI chat, queued input, model provider settings, token usage statistics, and TTS.

            ### Highlights
            - Luo Xiaohei themed animated desktop pet assets and app icon
            - Refined chat window and settings UI with green/black visual theme
            - Multi-provider model configuration: OpenAI-compatible providers, DeepSeek, Qwen, MiniMax, Claude, Doubao, and OpenRouter
            - Message queue support while Xiaohei is replying, with editable queued input
            - Token usage statistics tab in Settings
            - TTS configuration fixes, including startup voice loading from saved settings
            - Interaction improvements: proactive behaviors, outside-click chat close, and safer window positioning

            ### Downloads
            - **macOS**: `.dmg` (Universal — Intel + Apple Silicon)
            - **Windows**: `.msi` / `.exe`
            - **Linux**: `.deb` / `.AppImage` / `.rpm`

            ### First Run
            1. Launch the app.
            2. Open Settings from the tray/menu bar.
            3. Choose a model provider and enter the required API key, base URL, and model fields.
            4. Optional: enable and configure TTS voice settings.

            ### Notes
            This is a prerelease. macOS and Windows binaries are unsigned, so the first launch may require manual approval from the operating system.
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          args: ${{ matrix.args }}
