name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libspeechd-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LuoXiaoHei Pet ${{ github.ref_name }}'
          releaseBody: |
            ## LuoXiaoHei Desktop Pet ${{ github.ref_name }}

            Cross-platform desktop pet with streaming AI chat, tool calling, and TTS.
            Multi-model routing via **OpenRouter** (any compatible model) with optional Volcano Engine TTS.

            ### Highlights
            - 10+ animated states (idle / walk / drag / fall / happy / sleep / talking / thinking …)
            - Reasoning UI for chain-of-thought streaming
            - Tool calling architecture
            - Configurable model + endpoint via Settings panel

            ### Downloads
            - **macOS**: `.dmg` (Universal — Intel + Apple Silicon)
            - **Windows**: `.msi` / `.exe`
            - **Linux**: `.deb` / `.AppImage` / `.rpm`

            ### First Run
            1. Launch the app
            2. Tray icon → Settings
            3. Enter `OPENROUTER_API_KEY` (or set as environment variable before launch)
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          args: ${{ matrix.args }}
