name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libspeechd-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LuoXiaoHei Pet ${{ github.ref_name }}'
          releaseBody: |
            # LuoXiaoHei Pet ${{ github.ref_name }} (Prerelease)

            > 跨平台桌面宠物 - AI 对话 · Tool Calling · TTS · 多模型服务商 · 多状态动画
            > Cross-platform desktop pet - AI chat · Tool calling · TTS · Multi-provider models · Rich animation states

            ⚠️ **Prerelease / 实验阶段** - 0.x 期间配置项与 API 可能 breaking。

            ## 🔄 What's New since the previous release

            ### ✨ Improvements
            - **罗小黑素材与图标更新** - 桌宠动画素材、idle 预览 GIF 和应用图标改为更贴近罗小黑风格
            - **Settings 面板重做** - 绿黑主题视觉、内容结构和模型配置入口优化
            - **多模型服务商配置** - 支持 OpenAI-compatible、DeepSeek、Qwen、MiniMax、Claude、Doubao 和 OpenRouter
            - **消息队列输入** - 小黑回复期间仍可继续输入，队列内容可查看并编辑
            - **Token 用量统计** - Settings 新增用量统计 Tab，记录不同模型调用消耗
            - **交互体验增强** - 主动行为、卖萌提示、对话框外点击关闭、窗口位置保护

            ### 🐛 Fixes
            - **Windows prerelease 打包修复** - 版本号恢复为纯 `0.0.x`，避免 MSI 拒绝 `0.0.x-pre` 版本
            - **TTS 启动音色修复** - 启动时正确加载设置中的 Edge TTS / 语音配置
            - **聊天窗口动画闪烁修复** - 双击打开聊天时 idle 动画不再持续闪烁
            - **DeepSeek 等服务错误提示优化** - 请求失败时返回更明确的错误状态

            ## ✨ Highlights / 亮点

            - **OpenRouter + 多服务商接入** - 可直接配置主流模型服务商，也可通过 OpenRouter 中转兼容模型
            - **Animation system** - 10+ 状态（idle / walk / drag / fall / happy / lookAround / sleep / stretch / talking / thinking）
            - **Reasoning UI** - 可折叠 reasoning / 思考内容展示
            - **Tool calling architecture** - Agent 风格工具调用
            - **Reproducible asset pipeline** - `tools/build_xiaohei_assets.py`

            ## 📦 Downloads

            | Platform | File |
            |---|---|
            | macOS (Universal - Apple Silicon + Intel) | `LuoXiaoHei.Pet_*_universal.dmg` |
            | Windows x64 | `LuoXiaoHei.Pet_*_x64-setup.exe` · `.msi` |
            | Linux x86_64 | `*.AppImage` · `.deb` · `.rpm` |

            ## 🚀 First Run

            1. 打开应用 / Launch the app
            2. 托盘或菜单栏图标 → Settings / Tray or menu bar icon → Settings
            3. 选择模型服务商并填写 API Key、Base URL、Model 等字段
            4. 可选：开启 TTS，并选择语音音色

            ## ⚠️ Known Limitations

            - macOS / Windows 二进制 **未签名**（首启可能被系统拦截，需手动放行）
            - 0.x 版本 API/config 不保证向后兼容
            - 二创项目，**非官方授权**；个人学习用途

            ## 📝 Notes

            Fan project / 二次创作 - 罗小黑战记 IP 归 [HMCH 官方](https://xhei.cn/) 所有。
            Not affiliated with or endorsed by HMCH.

            ## 🔗 Full Changelog

            https://github.com/alertform/LuoXiaoHeiPet/releases
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          args: ${{ matrix.args }}
